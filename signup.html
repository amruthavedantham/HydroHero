<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HydroHero Signup</title>

<link rel="stylesheet" href="css/signup.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="signup-container">

<div class="signup-card">

<div class="signup-brand">
<h1 class="signup-logo">💧 HydroHero</h1>
<p class="signup-tagline">Become a Water Saving Hero</p>
</div>

<form class="signup-form">

<div class="signup-input-group">
<label class="signup-label">Full Name</label>
<input type="text" class="signup-input" placeholder="Enter your full name" required>
</div>

<div class="signup-input-group">
<label class="signup-label">Email</label>
<input type="email" class="signup-input" placeholder="Enter your email" required>
</div>

<div class="signup-input-group">
<label class="signup-label">Password</label>
<input type="password" class="signup-input" placeholder="Create a password" required>
</div>

<div class="signup-input-group">
<label class="signup-label">Confirm Password</label>
<input type="password" class="signup-input" placeholder="Confirm password" required>
</div>

<div class="signup-input-group">
<label class="signup-label">Village / Town</label>
<input type="text" class="signup-input" placeholder="Enter your village or town" required>
</div>

<button type="submit" class="signup-button">
Create Account
</button>

</form>

<p class="signup-redirect">
Already a HydroHero?
<a href="login.html">Login</a>
</p>

</div>

</div>

</body>
</html>
