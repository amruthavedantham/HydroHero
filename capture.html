<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capture Challenge</title>

<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<!-- AI Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
padding-bottom:80px;
font-family:Poppins;
background:linear-gradient(var(--light),#f5faff);
}

/* CAMERA CONTAINER */

.video-container{
padding:15px;
max-width:500px;
margin:auto;
}

/* VIDEO */

video{
width:100%;
border-radius:20px;
border:4px solid var(--primary);
margin-bottom:20px;
}

/* PHOTO BUTTONS */

.photo-buttons{
display:flex;
gap:15px;
margin-bottom:20px;
}

.photo-buttons button{
flex:1;
padding:14px;
border:none;
border-radius:30px;
background:var(--primary);
color:white;
font-size:16px;
cursor:pointer;
transition:0.25s;
}

.photo-buttons button:hover{
background:var(--accent);
}

/* PREVIEW SECTION */

.preview-section{
display:flex;
gap:15px;
margin-bottom:25px;
}

.preview-box{
flex:1;
background:var(--light);
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
padding:10px;
min-height:110px;
}

.preview-box img{
width:100%;
max-height:80px;
object-fit:cover;
border-radius:10px;
display:none;
margin-top:5px;
}

/* COMPLETE BUTTON */

.complete-btn{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:#9bbbe5;
color:white;
font-size:16px;
cursor:not-allowed;
}

.complete-btn.active{
background:var(--primary);
cursor:pointer;
}

/* TEXT */

.preview-box p{
margin:0;
font-weight:500;
color:var(--primary-dark);
}

.preview-box span{
font-size:13px;
color:#64748b;
}

</style>
</head>

<body>

<header class="topbar">

<h2 class="title" id="challengeTitle">💧 Challenge</h2>

<div class="icons">
<button onclick="toggleTheme()">☀️</button>
<button onclick="logout()">↗</button>
</div>

</header>


<div class="video-container">

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>

<div class="photo-buttons">
<button onclick="captureBefore()">📸 Before</button>
<button onclick="captureAfter()">📸 After</button>
</div>

<div class="preview-section">

<div class="preview-box">
<p>Before</p>
<img id="beforeImg">
<span id="beforeText">Not captured</span>
</div>

<div class="preview-box">
<p>After</p>
<img id="afterImg">
<span id="afterText">Not captured</span>
</div>

</div>

<button id="completeBtn" class="complete-btn" disabled>
✔ Complete Challenge
</button>

</div>


<nav class="bottomnav">
<a href="index.html">🏠<br>Home</a>
<a class="active" href="challenges.html">💧<br>Challenges</a>
<a href="dashboard.html">📊<br>Dashboard</a>
<a href="impact.html">📈<br>Impact</a>
<a href="leaderboard.html">🏆<br>Board</a>
</nav>


<script>

/* Theme + Logout */

function toggleTheme(){
document.body.classList.toggle("dark");
}

function logout(){
alert("Logged Out");
window.location.href="login.html";
}


/* Camera Setup */

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const completeBtn = document.getElementById("completeBtn");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
video.srcObject = stream;

video.onloadedmetadata = () => {
video.play();
};

})
.catch(err=>{
console.error(err);
alert("Camera permission required.");
});


/* Capture Logic */

let beforeTaken = false;
let afterTaken = false;

function captureBefore(){
takePhoto("beforeImg","beforeText");
beforeTaken = true;
}

function captureAfter(){
takePhoto("afterImg","afterText");
afterTaken = true;
verifyChallenge();
}

function takePhoto(imgId,textId){

if(video.videoWidth === 0){
alert("Camera still loading. Try again.");
return;
}

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const context = canvas.getContext("2d");
context.drawImage(video,0,0,canvas.width,canvas.height);

const imgData = canvas.toDataURL("image/png");

const img = document.getElementById(imgId);
img.src = imgData;
img.style.display="block";

document.getElementById(textId).style.display="none";

}


/* AI Model */

const MODEL_URL = "./my_model/";

let model;

async function loadModel(){

const modelURL = MODEL_URL + "model.json";
const metadataURL = MODEL_URL + "metadata.json";

model = await tmImage.load(modelURL, metadataURL);

console.log("AI Model Loaded");

}

loadModel();


/* AI Verification */

async function verifyChallenge(){

if(!beforeTaken || !afterTaken) return;

const afterImg = document.getElementById("afterImg");

const prediction = await model.predict(afterImg);

let best = prediction[0];

for(let i=1;i<prediction.length;i++){
if(prediction[i].probability > best.probability){
best = prediction[i];
}
}

console.log(best);
alert("Prediction: " + " (" + (best.probability*100).toFixed(1) + "%)");

if(best.className === "Tap Closed" && best.probability > 0.63){

alert("✅ AI Verified: Tap Closed!");

completeBtn.disabled = false;
completeBtn.classList.add("active");

}else{

alert("❌ Please upload a clear tap image.");

}

}


/* Complete Button */

completeBtn.addEventListener("click", function(){

alert("🎉 Challenge Completed!\n+20 Points Earned\n12L Water Saved");

window.location.href="dashboard.html";

});


/* Load Challenge Title */

const params = new URLSearchParams(window.location.search);
const challenge = params.get("challenge");

const titles = {
tap:"💧 Turn off tap while brushing",
shower:"💧 Reduce shower time",
plants:"💧 Reuse water for plants",
bucket:"💧 Use bucket instead of hose"
};

if(challenge && titles[challenge]){
document.getElementById("challengeTitle").innerText = titles[challenge];
}

</script>

</body>
</html>
