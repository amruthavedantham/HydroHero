<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HydroHero Login</title>

<link rel="stylesheet" href="css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="login-brand">
<h1 class="login-logo">💧 HydroHero</h1>
<p class="login-tagline">Welcome Back Water Hero</p>
</div>

<form class="login-form">

<div class="login-input-group">
<label class="login-label">Email</label>
<input type="email" class="login-input" placeholder="Enter your email" required>
</div>

<div class="login-input-group">
<label class="login-label">Password</label>
<input type="password" class="login-input" placeholder="Enter your password" required>
</div>

<p class="login-forgot">
<a href="#">Forgot Password?</a>
</p>

<button type="submit" class="login-button">
Login
</button>

</form>

<p class="login-redirect">
New to HydroHero?
<a href="signup.html">Create Account</a>
</p>

</div>

</div>

</body>

</html>
